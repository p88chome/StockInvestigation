name: Deploy to Firebase Hosting and Functions on merge
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Fullstack App (Client & Server)
        run: npm run build
        
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: stockinvestigate-36eb4
          channelId: live

      - name: Deploy Firebase Functions (with env vars)
        env:
          AZURE_OPENAI_ENDPOINT: '${{ secrets.AZURE_OPENAI_ENDPOINT }}'
          AZURE_OPENAI_API_KEY: '${{ secrets.AZURE_OPENAI_API_KEY }}'
          AZURE_OPENAI_DEPLOYMENT: '${{ secrets.AZURE_OPENAI_DEPLOYMENT }}'
          AZURE_OPENAI_API_VERSION: '${{ secrets.AZURE_OPENAI_API_VERSION }}'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json

          # Enable legacy config command (required for functions:config:set)
          npx firebase-tools experiments:enable legacyRuntimeConfigCommands

          # Set Azure OpenAI config as Firebase Function environment variables
          npx firebase-tools functions:config:set \
            azure.endpoint="${AZURE_OPENAI_ENDPOINT}" \
            azure.api_key="${AZURE_OPENAI_API_KEY}" \
            azure.deployment="${AZURE_OPENAI_DEPLOYMENT}" \
            azure.api_version="${AZURE_OPENAI_API_VERSION}" \
            --project stockinvestigate-36eb4

          # Deploy functions
          npx firebase-tools deploy --only functions --project stockinvestigate-36eb4 -f
          rm sa.json
